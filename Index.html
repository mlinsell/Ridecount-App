<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Ride Tracker</title>
  <?!= include('Stylesheet'); ?>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
  </div>
  
  <div id="toast-container">
    <div id="toast-message" class="toast">Logged!</div>
  </div>

  <div id="app-container">
    <div id="top-title-container">
      <h1 id="main-title">Ride Tracker Dashboard</h1>
    </div>

    <div id="main-content">
      
      <div id="home-screen" class="tab-screen active">
        <div id="stats-cards-container">
          <div class="stat-box">
            <div id="home-total-rides" class="stat-number">0</div>
            <div class="stat-label">TOTAL RIDES</div>
          </div>
          <div class="stat-box">
            <div id="home-total-parks" class="stat-number">0</div>
            <div class="stat-label">PARKS</div>
          </div>
          <div class="stat-box">
            <div id="home-total-attractions" class="stat-number">0</div>
            <div class="stat-label">ATTRACTIONS</div>
          </div>
        </div>
        
        <h2 class="section-title">MOST RECENT</h2>
        <div id="home-most-recent-container"></div>
        
        <h2 class="section-title">TOP 5 ATTRACTIONS</h2>
        <div id="home-top-5-container" style="padding-bottom:10px;"></div>
      </div>

      <div id="log-screen" class="tab-screen">
        <div id="active-trip-banner" style="display:none;">
          <div id="active-trip-info">
            <span id="trip-banner-park">Park Name</span>
            <span id="trip-banner-date">Date</span>
          </div>
          <a id="end-trip-link" onclick="endCurrentTrip()">End Trip</a>
        </div>
        
        <div id="trip-setup-container">
          <h2 class="section-title" style="margin-top:0;">Start New Trip</h2>
          <p class="gray-info" style="margin-bottom:20px;">Set the date and park once to begin logging.</p>
          <form id="start-trip-form" onsubmit="handleStartTrip(event)">
            <div class="form-group">
              <label class="form-label" for="trip-date">Date</label>
              <input type="date" id="trip-date" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="trip-park-select">Park Name</label>
              <select id="trip-park-select" required onchange="checkNewParkInput(this)"></select>
              <input type="text" id="trip-park-new" placeholder="Enter new park name" style="margin-top:10px; display:none;">
            </div>
            <button type="submit" class="confirm-btn">Start Trip</button>
          </form>
        </div>

        <div id="trip-logging-container" style="display:none;">
          <h2 class="section-title" style="margin-top:0;">Log a Ride</h2>
          <form id="log-ride-form" onsubmit="handleLogRide(event)">
            <div class="form-group">
              <label class="form-label" for="log-attraction-select">Attraction</label>
              <select id="log-attraction-select" required onchange="checkNewAttractionInput(this)"></select>
              <input type="text" id="log-attraction-new" placeholder="Enter new attraction name" style="margin-top:10px; display:none;">
            </div>
            <div class="form-group">
              <label class="form-label" for="log-count">Ride Count</label>
              <input type="number" id="log-count" min="1" required value="1" inputmode="numeric">
            </div>
            <button type="submit" class="confirm-btn">Log Ride</button>
          </form>
        </div>
      </div>

      <div id="attractions-screen" class="tab-screen">
        <h2 class="section-title">Attractions</h2>
        <div id="attractions-search-container">
          <input type="text" id="attractions-search" placeholder="Search attraction or park..." onkeyup="filterAttractions(this.value)">
        </div>
        <div id="attractions-list-grouped" style="padding: 0 20px;"></div>
      </div>

      <div id="parks-screen" class="tab-screen">
        <h2 class="section-title">Parks</h2>
        <div id="parks-list-grouped"></div>
      </div>

      <div id="stats-screen" class="tab-screen">
        <h2 class="section-title">Statistics</h2>
        <div id="stats-content-area"></div>
      </div>
      
    </div> 

    <div id="detail-panel" class="detail-panel">
      <div class="detail-header">
        <div class="back-btn" onclick="closeDetailPanel()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2 id="detail-panel-title">Details</h2>
      </div>
      <div class="detail-content" id="detail-panel-content"></div>
    </div>

    <nav id="bottom-nav">
      <div class="nav-tab active" onclick="switchTab('home')">
        <svg class="nav-icon svg-house" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9.5L12 4L21 9.5V20C21 20.2652 20.8946 20.5196 20.7071 20.7071C20.5196 20.8946 20.2652 21 20 21H16C15.7348 21 15.4804 20.8946 15.2929 20.7071C15.1054 20.5196 15 20.2652 15 20V14C15 13.7348 14.8946 13.4804 14.7071 13.2929C14.5196 13.1054 14.2652 13 14 13H10C9.73478 13 9.48043 13.1054 9.29289 13.2929C9.10536 13.4804 9 13.7348 9 14V20C9 20.2652 8.89464 20.5196 8.70711 20.7071C8.51957 20.8946 8.26522 21 8 21H4C3.73478 21 3.48043 20.8946 3.29289 20.7071C3.10536 20.5196 3 20.2652 3 20V9.5Z"/>
        </svg>
        <span class="nav-label">Home</span>
      </div>
      <div class="nav-tab" onclick="switchTab('log')">
        <svg class="nav-icon svg-list" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 7H19V9H9V7ZM9 11H19V13H9V11ZM9 15H19V17H9V15ZM5 7H7V9H5V7ZM5 11H7V13H5V11ZM5 15H7V17H5V15ZM3 3V21H21V3H3ZM5 5H19V19H5V5Z" />
        </svg>
        <span class="nav-label">Log</span>
      </div>
      <div class="nav-tab" onclick="switchTab('attractions')">
        <svg class="nav-icon svg-train" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 17C4 18.1 4.9 19 6 19H18C19.1 19 20 18.1 20 17V8H4V17ZM17 4H7V6H17V4ZM3 2H21C21.6 2 22 2.4 22 3V21C22 21.6 21.6 22 21 22H3C2.4 22 2 21.6 2 21V3C2 2.4 2.4 2 3 2ZM6 10H8V12H6V10ZM11 10H13V12H11V10ZM16 10H18V12H16V10ZM6 14H8V16H6V14ZM11 14H13V16H11V14ZM16 14H18V16H16V14ZM5 20H19V21H5V20Z" />
        </svg>
        <span class="nav-label">Rides</span>
      </div>
      <div class="nav-tab" onclick="switchTab('parks')">
        <svg class="nav-icon svg-pin" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.1 2 5 5.1 5 9C5 14.2 12 22 12 22C12 22 19 14.2 19 9C19 5.1 15.9 2 12 2ZM12 11.5C10.6 11.5 9.5 10.4 9.5 9C9.5 7.6 10.6 6.5 12 6.5C13.4 6.5 14.5 7.6 14.5 9C14.5 10.4 13.4 11.5 12 11.5Z"/>
        </svg>
        <span class="nav-label">Parks</span>
      </div>
      <div class="nav-tab" onclick="switchTab('stats')">
        <svg class="nav-icon svg-chart" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM17 17H15V11H17V17ZM13 17H11V7H13V17ZM9 17H7V13H9V17Z" />
        </svg>
        <span class="nav-label">Stats</span>
      </div>
    </nav>
  </div>

  <?!= include('JavaScript'); ?>
</body>
</html>
