<script>
  let rawData = [];
  const NEW_OPTION_VALUE = "___NEW___";
  
  // Session State variables
  const TRIP_STORAGE_KEY = 'ridecount_active_trip';
  let activeTrip = null;
  let tripWarningAcknowledged = false;

  // --- UTILS ---
  function parseDateString(str) {
    const parts = str.split('/');
    if (parts.length !== 3) return new Date(0);
    return new Date(parts[2], parts[1] - 1, parts[0]);
  }

  function getTodayString() {
    const today = new Date();
    return String(today.getDate()).padStart(2, '0') + '/' + 
           String(today.getMonth() + 1).padStart(2, '0') + '/' + 
           today.getFullYear();
  }

  function toggleLoader(show) {
    document.getElementById('loader').style.display = show ? 'flex' : 'none';
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 3000);
  }

  // --- NAVIGATION ---
  function switchTab(tabId) {
    document.querySelectorAll('main section').forEach(sec => sec.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    
    document.getElementById('tab-' + tabId).classList.add('active');
    event.currentTarget.classList.add('active');
    
    if (tabId === 'log') renderLogState();
    if (tabId === 'attractions') renderAttractionsTab();
    if (tabId === 'parks') renderParksTab();
    if (tabId === 'stats') renderStatsTab();
  }

  function openDetailPanel(title, htmlContent) {
    document.getElementById('detail-title').textContent = title;
    document.getElementById('detail-content').innerHTML = htmlContent;
    document.getElementById('detail-panel').classList.add('open');
  }

  function closeDetailPanel() {
    document.getElementById('detail-panel').classList.remove('open');
  }

  // --- DATA PROCESSING & RENDERING ---
  function loadData() {
    toggleLoader(true);
    google.script.run.withSuccessHandler(data => {
      rawData = data.map(d => ({...d, parsedDate: parseDateString(d.date)}));
      rawData.sort((a, b) => b.parsedDate - a.parsedDate); // Global sort desc
      renderHome();
      toggleLoader(false);
    }).withFailureHandler(err => {
      alert("Error loading data: " + err);
      toggleLoader(false);
    }).getData();
  }

  function renderHome() {
    let totalRides = 0;
    const parks = new Set();
    const attrs = new Set();
    const attrCounts = {};

    rawData.forEach(r => {
      totalRides += r.count;
      parks.add(r.park);
      attrs.add(r.attraction);
      
      const key = r.park + '|' + r.attraction;
      attrCounts[key] = (attrCounts[key] || 0) + r.count;
    });

    document.getElementById('home-total-rides').textContent = totalRides;
    document.getElementById('home-total-parks').textContent = parks.size;
    document.getElementById('home-total-attractions').textContent = attrs.size;

    // Recent
    if (rawData.length > 0) {
      const recent = rawData[0];
      document.getElementById('home-recent').innerHTML = `
        <div class="flex-between">
          <div>
            <div style="font-weight:bold; font-size:18px;">${recent.attraction}</div>
            <div class="stat-label">${recent.park} • ${recent.date}</div>
          </div>
          <div class="badge">+${recent.count}</div>
        </div>`;
    }

    // Top 5
    const top5 = Object.entries(attrCounts)
      .map(([key, count]) => ({ key, count }))
      .sort((a, b) => b.count - a.count)
      .slice(0, 5);

    document.getElementById('home-top5').innerHTML = top5.map((t, i) => {
      const [park, attr] = t.key.split('|');
      return `
        <div class="list-item">
          <div>
            <span style="color:var(--text-muted); margin-right:8px;">${i+1}.</span>
            <span style="font-weight:bold;">${attr}</span>
            <div class="stat-label" style="padding-left:22px;">${park}</div>
          </div>
          <div class="badge">${t.count}</div>
        </div>
      `;
    }).join('');
  }

  // --- TRIP SESSION & LOGGING LOGIC ---
  function renderLogState() {
    const stored = localStorage.getItem(TRIP_STORAGE_KEY);
    
    // Hide all dynamic log containers initially
    document.getElementById('trip-setup-container').classList.add('hidden');
    document.getElementById('start-trip-form').classList.add('hidden');
    document.getElementById('no-trip-msg').classList.remove('hidden');
    document.getElementById('trip-warning-banner').classList.add('hidden');
    document.getElementById('active-trip-container').classList.add('hidden');

    if (stored) {
      activeTrip = JSON.parse(stored);
      
      // Edge Case: Stored trip is from a previous day
      if (activeTrip.date !== getTodayString() && !tripWarningAcknowledged) {
        document.getElementById('trip-warning-msg').textContent = `Your active trip is from ${activeTrip.date}. Do you want to continue it or start a new one?`;
        document.getElementById('trip-warning-banner').classList.remove('hidden');
      } else {
        // Display active trip
        document.getElementById('active-trip-container').classList.remove('hidden');
        document.getElementById('active-trip-date').textContent = activeTrip.date;
        document.getElementById('active-trip-park').textContent = activeTrip.park;
        updateAttrDropdown();
      }
    } else {
      // No active trip found, show setup UI
      document.getElementById('trip-setup-container').classList.remove('hidden');
    }
  }

  function showStartTripForm() {
    document.getElementById('no-trip-msg').classList.add('hidden');
    document.getElementById('start-trip-form').classList.remove('hidden');
    
    document.getElementById('trip-date').value = getTodayString();
    document.getElementById('trip-park-new').value = '';
    document.getElementById('trip-park-new').classList.add('hidden');
    
    const parks = [...new Set(rawData.map(r => r.park))].sort();
    const parkSel = document.getElementById('trip-park-select');
    parkSel.innerHTML = '<option value="" disabled selected>Select a park...</option>' + 
                        parks.map(p => `<option value="${p}">${p}</option>`).join('') +
                        `<option value="${NEW_OPTION_VALUE}">+ Add new park...</option>`;
  }

  document.getElementById('trip-park-select').addEventListener('change', function(e) {
    const isNew = e.target.value === NEW_OPTION_VALUE;
    document.getElementById('trip-park-new').classList.toggle('hidden', !isNew);
  });

  // Start New Trip Submission
  document.getElementById('start-trip-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const pSel = document.getElementById('trip-park-select').value;
    const parkName = pSel === NEW_OPTION_VALUE ? document.getElementById('trip-park-new').value.trim() : pSel;
    const dateVal = document.getElementById('trip-date').value.trim();

    if (!parkName || !dateVal) {
      alert("Please fill all trip details.");
      return;
    }

    activeTrip = { date: dateVal, park: parkName };
    localStorage.setItem(TRIP_STORAGE_KEY, JSON.stringify(activeTrip));
    tripWarningAcknowledged = false;
    renderLogState();
  });

  // Overnight Warning Actions
  function continueTrip() {
    tripWarningAcknowledged = true;
    renderLogState();
  }

  function clearTripAndRestart() {
    localStorage.removeItem(TRIP_STORAGE_KEY);
    activeTrip = null;
    tripWarningAcknowledged = false;
    renderLogState();
    showStartTripForm();
  }

  // End Trip Action
  function endTrip() {
    if (confirm(`End trip to ${activeTrip.park}? You can start a new one any time.`)) {
      localStorage.removeItem(TRIP_STORAGE_KEY);
      activeTrip = null;
      tripWarningAcknowledged = false;
      renderLogState();
    }
  }

  function updateAttrDropdown() {
    if (!activeTrip) return;
    const attrSel = document.getElementById('log-attr-select');
    const attrs = [...new Set(rawData.filter(r => r.park === activeTrip.park).map(r => r.attraction))].sort();
    
    attrSel.innerHTML = '<option value="" disabled selected>Select an attraction...</option>' + 
                        attrs.map(a => `<option value="${a}">${a}</option>`).join('') +
                        `<option value="${NEW_OPTION_VALUE}">+ Add new attraction...</option>`;
    
    document.getElementById('log-attr-new').classList.add('hidden');
  }

  document.getElementById('log-attr-select').addEventListener('change', function(e) {
    const isNew = e.target.value === NEW_OPTION_VALUE;
    document.getElementById('log-attr-new').classList.toggle('hidden', !isNew);
  });

  // Log Ride Submission
  document.getElementById('log-form').addEventListener('submit', function(e) {
    e.preventDefault();
    if (!activeTrip) return;

    const attrSel = document.getElementById('log-attr-select').value;
    const attrName = attrSel === NEW_OPTION_VALUE ? document.getElementById('log-attr-new').value.trim() : attrSel;

    const payload = {
      date: activeTrip.date,
      park: activeTrip.park,
      attraction: attrName,
      count: parseInt(document.getElementById('log-count').value, 10)
    };

    if (!payload.attraction || payload.count < 1) {
      alert("Please select an attraction and count.");
      return;
    }

    toggleLoader(true);
    google.script.run.withSuccessHandler(data => {
      rawData = data.map(d => ({...d, parsedDate: parseDateString(d.date)}));
      rawData.sort((a, b) => b.parsedDate - a.parsedDate);
      renderHome();
      
      // Reset only the logging fields, leave active trip intact
      document.getElementById('log-count').value = 1;
      document.getElementById('log-attr-new').value = '';
      updateAttrDropdown(); // Resets selector to default prompt
      
      toggleLoader(false);
      showToast();
    }).addRide(payload);
  });

  // --- ATTRACTIONS TAB ---
  function renderAttractionsTab() {
    const search = document.getElementById('attr-search').value.toLowerCase();
    
    // Group by park, then attraction
    const tree = {};
    rawData.forEach(r => {
      if (!tree[r.park]) tree[r.park] = {};
      if (!tree[r.park][r.attraction]) tree[r.park][r.attraction] = { count: 0, lastDate: new Date(0), dateStr: '' };
      
      tree[r.park][r.attraction].count += r.count;
      if (r.parsedDate > tree[r.park][r.attraction].lastDate) {
        tree[r.park][r.attraction].lastDate = r.parsedDate;
        tree[r.park][r.attraction].dateStr = r.date;
      }
    });

    let html = '';
    Object.keys(tree).sort().forEach(park => {
      const attrsHtml = Object.keys(tree[park])
        .sort()
        .filter(a => a.toLowerCase().includes(search) || park.toLowerCase().includes(search))
        .map(a => `
          <div class="list-item" onclick="viewAttractionDetails('${park.replace(/'/g, "\\'")}', '${a.replace(/'/g, "\\'")}')">
            <div>
              <div style="font-weight:bold;">${a}</div>
              <div class="stat-label">Last: ${tree[park][a].dateStr}</div>
            </div>
            <div class="badge">${tree[park][a].count}</div>
          </div>
        `).join('');

      if (attrsHtml) {
        html += `<h2 style="margin-top:24px;">${park}</h2><div class="card" style="padding:0 16px;">${attrsHtml}</div>`;
      }
    });

    document.getElementById('attr-list').innerHTML = html || '<p>No attractions found.</p>';
  }

  document.getElementById('attr-search').addEventListener('input', renderAttractionsTab);

  function viewAttractionDetails(park, attr) {
    const logs = rawData.filter(r => r.park === park && r.attraction === attr);
    const total = logs.reduce((sum, r) => sum + r.count, 0);
    
    let html = `
      <div class="card" style="text-align:center;">
        <div class="stat-hero">${total}</div>
        <div class="stat-label">TOTAL RIDES AT ${park.toUpperCase()}</div>
      </div>
      <h3>Log History</h3>
      <div class="card" style="padding:0 16px; margin-top:12px;">
        ${logs.map(l => `
          <div class="list-item">
            <div>${l.date}</div>
            <div class="badge">${l.count}</div>
          </div>
        `).join('')}
      </div>
    `;
    openDetailPanel(attr, html);
  }

  // --- PARKS TAB ---
  function renderParksTab() {
    const pStats = {};
    rawData.forEach(r => {
      if (!pStats[r.park]) pStats[r.park] = { total: 0, attrs: new Set() };
      pStats[r.park].total += r.count;
      pStats[r.park].attrs.add(r.attraction);
    });

    const html = Object.keys(pStats).sort().map(p => `
      <div class="list-item" onclick="viewParkDetails('${p.replace(/'/g, "\\'")}')">
        <div>
          <div style="font-weight:bold;">${p}</div>
          <div class="stat-label">${pStats[p].attrs.size} Unique Attractions</div>
        </div>
        <div class="badge">${pStats[p].total}</div>
      </div>
    `).join('');

    document.getElementById('parks-list').innerHTML = html;
  }

  function viewParkDetails(park) {
    const logs = rawData.filter(r => r.park === park);
    const aStats = {};
    logs.forEach(l => {
      aStats[l.attraction] = (aStats[l.attraction] || 0) + l.count;
    });

    const total = logs.reduce((sum, r) => sum + r.count, 0);

    let html = `
      <div class="card" style="text-align:center;">
        <div class="stat-hero">${total}</div>
        <div class="stat-label">TOTAL RIDES</div>
      </div>
      <h3>Attractions</h3>
      <div class="card" style="padding:0 16px; margin-top:12px;">
        ${Object.entries(aStats).sort((a,b) => b[1] - a[1]).map(([attr, count]) => `
          <div class="list-item" onclick="viewAttractionDetails('${park.replace(/'/g, "\\'")}', '${attr.replace(/'/g, "\\'")}')">
            <div style="font-weight:bold;">${attr}</div>
            <div class="badge">${count}</div>
          </div>
        `).join('')}
      </div>
    `;
    openDetailPanel(park, html);
  }

  // --- STATS TAB ---
  function renderStatsTab() {
    if (rawData.length === 0) {
      document.getElementById('stats-content').innerHTML = '<p>No data available yet.</p>';
      return;
    }

    const currentYear = new Date().getFullYear();
    const currentMonth = new Date().getMonth();

    let thisYearCount = 0;
    let thisMonthCount = 0;
    let earliestDate = rawData[0].parsedDate;
    let earliestStr = rawData[0].date;
    
    const attrCounts = {};
    const yearCounts = {};

    rawData.forEach(r => {
      const y = r.parsedDate.getFullYear();
      const m = r.parsedDate.getMonth();
      
      if (y === currentYear) thisYearCount += r.count;
      if (y === currentYear && m === currentMonth) thisMonthCount += r.count;

      if (r.parsedDate < earliestDate) {
        earliestDate = r.parsedDate;
        earliestStr = r.date;
      }

      const aKey = r.park + '|' + r.attraction;
      attrCounts[aKey] = (attrCounts[aKey] || 0) + r.count;

      yearCounts[y] = (yearCounts[y] || 0) + r.count;
    });

    let topAttraction = { name: '', count: 0 };
    const thresholds = [10, 25, 50, 100, 250, 500, 1000];
    const milestones = [];

    Object.entries(attrCounts).forEach(([key, count]) => {
      if (count > topAttraction.count) {
        topAttraction = { name: key.split('|')[1] + ' (' + key.split('|')[0] + ')', count: count };
      }
      
      let highestMilestone = 0;
      thresholds.forEach(t => { if (count >= t) highestMilestone = t; });
      if (highestMilestone > 0) {
        milestones.push({ name: key.split('|')[1], park: key.split('|')[0], count, milestone: highestMilestone });
      }
    });
    
    milestones.sort((a, b) => b.count - a.count);

    let html = `
      <div style="display:flex; gap:16px;">
        <div class="card" style="flex:1;">
          <div class="stat-hero" style="font-size:28px;">${thisMonthCount}</div>
          <div class="stat-label">THIS MONTH</div>
        </div>
        <div class="card" style="flex:1;">
          <div class="stat-hero" style="font-size:28px;">${thisYearCount}</div>
          <div class="stat-label">THIS YEAR</div>
        </div>
      </div>

      <h2>Highlights</h2>
      <div class="card">
        <div style="margin-bottom:12px;">
          <div class="stat-label">ALL-TIME MOST RIDDEN</div>
          <div style="font-weight:bold; font-size:18px;">${topAttraction.name}</div>
          <div style="color:var(--primary-color); font-weight:bold;">${topAttraction.count} rides</div>
        </div>
        <hr style="border:0; border-top:1px solid var(--border-color); margin:12px 0;">
        <div>
          <div class="stat-label">FIRST RIDE LOGGED</div>
          <div style="font-weight:bold; font-size:18px;">${earliestStr}</div>
        </div>
      </div>

      <h2>Rides Per Year</h2>
      <div class="card" style="padding:0 16px;">
        ${Object.keys(yearCounts).sort((a,b) => b - a).map(y => `
          <div class="list-item">
            <div style="font-weight:bold;">${y}</div>
            <div class="badge">${yearCounts[y]}</div>
          </div>
        `).join('')}
      </div>

      <h2>Milestones Passed</h2>
      <div class="card" style="padding:0 16px;">
        ${milestones.length === 0 ? '<div class="list-item">None yet. Hit 10 rides to unlock!</div>' : 
          milestones.map(m => `
          <div class="list-item">
            <div>
              <span style="font-weight:bold;">${m.name}</span>
              <div class="stat-label">${m.park}</div>
            </div>
            <div style="text-align:right;">
              <div style="color:var(--primary-color); font-weight:bold; font-size:14px;">${m.milestone}+ Club</div>
              <div class="stat-label">Total: ${m.count}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;

    document.getElementById('stats-content').innerHTML = html;
  }

  // Init
  window.onload = loadData;
</script>
